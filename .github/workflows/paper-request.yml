# .github/workflows/paper-request.yml
#
# Triggered by workflow_dispatch from the Cloudflare Worker
# (POST /request-paper). Files a public GitHub issue tagged
# `paper-request` so a maintainer can pick up the paper, ingest its
# diagrams into library-bundled/, and reply when the entries land.
# This is the pre-integration intake path for papers whose integrals
# current SubTropica can't compute (elliptic, higher-genus, K3, etc.).

name: Process Paper Request

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "JSON payload from SubTropica UI"
        required: true
        type: string

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build issue body
        id: build
        shell: python3 {0}
        run: |
          import json, os

          payload = json.loads(os.environ["PAYLOAD"])

          arxiv_id  = (payload.get("arxivId", "") or "").strip()
          reason    = (payload.get("reason",  "") or "").strip()
          name      = (payload.get("name",    "") or "").strip()
          email     = (payload.get("email",   "") or "").strip()
          timestamp = (payload.get("timestamp", "") or "").strip()

          # Title: short and scannable in the issue list.
          title = f"Paper request: arXiv:{arxiv_id}"

          # Issue body. Structured fields above the fold, raw payload
          # collapsed below for maintainer debugging.
          lines = []
          lines.append(f"**arXiv:** [{arxiv_id}](https://arxiv.org/abs/{arxiv_id})")
          lines.append("")
          if reason:
              lines.append("### Why this paper")
              lines.append("")
              lines.append(reason)
              lines.append("")
          if name or email:
              lines.append("### Requester")
              if name:
                  lines.append(f"- **Name:** {name}")
              if email:
                  # Don't auto-link; some requesters might prefer not to
                  # surface a clickable mailto: in a public issue.
                  lines.append(f"- **Contact:** `{email}`")
              lines.append("")
          lines.append("---")
          lines.append("")
          lines.append(
              "🍹 Thanks for the request! We'll analyze this paper as "
              "soon as we finish our piña coladas. Subscribe to this "
              "issue if you'd like a notification when the library "
              "entries land."
          )
          lines.append("")
          if timestamp:
              lines.append(f"_Filed: {timestamp}_")
          lines.append("")
          lines.append("<details><summary>Raw payload</summary>")
          lines.append("")
          lines.append("```json")
          lines.append(json.dumps(payload, indent=2))
          lines.append("```")
          lines.append("")
          lines.append("</details>")

          body = "\n".join(lines)

          # Label set kept short — `paper-request` for triage, no
          # sub-categorisation since the maintainer's job is to ingest
          # the paper regardless of why.
          labels = ["paper-request"]

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"title={title}\n")
              f.write(f"labels={','.join(labels)}\n")
              f.write("body<<PAPER_REQUEST_BODY_EOF\n")
              f.write(body)
              f.write("\nPAPER_REQUEST_BODY_EOF\n")
        env:
          PAYLOAD: ${{ inputs.payload }}

      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.build.outputs.title }}
          ISSUE_BODY: ${{ steps.build.outputs.body }}
          ISSUE_LABELS: ${{ steps.build.outputs.labels }}
        run: |
          # Ensure the paper-request label exists (idempotent; --force
          # updates an existing label rather than failing).
          gh label create paper-request \
              --color "0e8a16" \
              --description "User-submitted request to analyze an arXiv paper" \
              --force >/dev/null 2>&1 || true

          gh issue create \
            --title "$ISSUE_TITLE" \
            --body  "$ISSUE_BODY" \
            --label "$ISSUE_LABELS"
